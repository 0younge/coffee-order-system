spring:
  application:
    name: coffee-order-system
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:${DB_PORT:3307}/${DB_NAME:coffee_order_system}}
    username: ${DB_USERNAME:coffee}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: SET SESSION innodb_lock_wait_timeout = 5
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

outbox:
  worker:
    enabled: ${OUTBOX_WORKER_ENABLED:true}
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:50}
